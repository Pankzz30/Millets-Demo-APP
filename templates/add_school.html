{% extends 'base.html' %}
{% block content %}
<div class="mb-3 flex flex-col md:flex-row md:items-center justify-between gap-2 md:gap-4">
    <div class="flex items-center gap-4">
        <a href="{{ url_for('schools_page') }}" class="btn-ghost !p-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <div class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-accent-color mb-0.5">Infrastructure Provisioning</div>
            <h1 class="text-3xl font-extrabold tracking-tight text-primary m-0">Add Distribution Point</h1>
        </div>
    </div>
</div>

<div class="grid grid-cols-1 gap-5 items-start">

    <!-- New Registration -->
    <div class="flex flex-col gap-5">
        <div class="card overflow-hidden transition-all duration-300">
            <div class="p-6 border-b border-light bg-tertiary">
                <h2 class="text-xl font-black text-primary mb-0.5">New Entity Registration</h2>
                <p class="text-xs font-bold text-tertiary uppercase tracking-widest">Search & Pin via Global Intelligence</p>
            </div>
            
            <div class="p-6">
                <div class="relative mb-4">
                    <input type="text" id="mapsSearch" placeholder="Find location on Google Maps..."
                        class="w-full bg-tertiary border border-light rounded-2xl px-5 py-4 text-sm font-bold text-primary focus:outline-none focus:ring-2 focus:ring-brand-color/10 focus:bg-primary transition-all">
                    <div class="absolute right-4 top-4 text-tertiary">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                </div>

                <div id="mapPreview" class="w-full h-48 rounded-[2rem] bg-tertiary border border-light flex flex-col items-center justify-center text-center gap-3 overflow-hidden mb-4">
                    <svg class="w-10 h-10 text-tertiary opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                    <p class="text-[10px] font-black text-tertiary uppercase tracking-widest opacity-50">Map Preview Area</p>
                </div>

                <form method="POST" id="addForm" class="space-y-6">
                    <input type="hidden" name="action" value="add">
                    <input type="hidden" name="latitude" id="new_lat">
                    <input type="hidden" name="longitude" id="new_lng">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1.5 md:col-span-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-tertiary ml-1">Legal School Name *</label>
                            <input type="text" name="name" id="new_name" required placeholder="Verification will match this name"
                                class="w-full bg-tertiary border border-light rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand-color/10 transition-all">
                        </div>
                        
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-tertiary ml-1">UDISE Code</label>
                            <input type="text" name="udise" placeholder="11-digit code"
                                class="w-full bg-tertiary border border-light rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand-color/10 transition-all">
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-tertiary ml-1">Assign Program Target</label>
                            <select name="hp_id" required class="w-full bg-tertiary border border-light rounded-xl px-4 py-3 text-sm font-semibold text-primary focus:outline-none focus:ring-2 focus:ring-brand-color/10 cursor-pointer">
                                <option value="">Select Target...</option>
                                {% for p in projects %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
                            </select>
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-tertiary ml-1">Administrative District</label>
                            <input type="text" name="district" placeholder="e.g. Pune"
                                class="w-full bg-tertiary border border-light rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand-color/10 transition-all">
                        </div>

                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-tertiary ml-1">Tahsil / Block</label>
                            <input type="text" name="tahsil" placeholder="e.g. Haveli"
                                class="w-full bg-tertiary border border-light rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand-color/10 transition-all">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-tertiary ml-1">Physical Address / Village</label>
                        <input type="text" name="location" id="new_location" placeholder="Full address details"
                            class="w-full bg-tertiary border border-light rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand-color/10 transition-all">
                    </div>

                    <button type="submit" class="w-full btn-brand justify-center py-4 bg-brand-color text-white shadow-xl shadow-brand-color/10 tracking-[0.2em] uppercase text-xs">
                        Register & Initialize Point
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
async function searchExisting(q) {
    const container = document.getElementById('existingResults');
    if (q.length < 2) {
        container.innerHTML = '<div class="py-12 text-center"><p class="text-xs font-bold text-white/20 uppercase tracking-widest">Awaiting Input...</p></div>';
        return;
    }
    const res = await fetch(`/schools/search-json?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    
    if (!data.length) {
        container.innerHTML = '<div class="py-12 text-center"><p class="text-xs font-bold text-red-400/40 uppercase tracking-widest">No Registry Found</p></div>';
        return;
    }
    
    container.innerHTML = data.map(s => `
        <div onclick="selectExisting(${s.id}, this)"
            class="p-4 rounded-2xl cursor-pointer transition-all border border-white/5 bg-white/5 hover:bg-white/10">
            <div class="font-bold text-sm text-white">${s.name}</div>
            <div class="text-[10px] font-bold text-white/40 uppercase tracking-tight mt-1">${s.location || 'Master Record'}</div>
        </div>`).join('');
}

function selectExisting(id, el) {
    document.getElementById('link_dp_id').value = id;
    document.querySelectorAll('#existingResults > div').forEach(d => {
        d.classList.remove('!bg-gold', '!border-gold', '!text-brand');
        d.querySelector('.text-white')?.classList.remove('!text-brand');
    });
    el.classList.add('!bg-gold', '!border-gold');
    el.style.color = 'var(--brand-color)';
}

// Simple map embed on search
document.getElementById('mapsSearch').addEventListener('change', function() {
    const q = encodeURIComponent(this.value);
    document.getElementById('mapPreview').innerHTML =
        `<iframe width="100%" height="100%" style="border:0;" loading="lazy"
        src="https://maps.google.com/maps?q=${q}&output=embed" allowfullscreen></iframe>`;
    document.getElementById('new_name').value = this.value;
});
</script>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
</style>
{% endblock %}
