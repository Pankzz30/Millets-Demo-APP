{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-800">Add School</h1>
        <p class="text-gray-500 text-sm mt-1">Optimised flow: search existing first, then add from Google Maps only if new.</p>
    </div>
    <a href="{{ url_for('schools_page') }}"
        class="bg-brand text-white font-semibold px-5 py-2 rounded-lg text-sm hover:bg-brand-light transition">Back</a>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- Left: Search existing -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 flex flex-col">
        <h2 class="font-bold text-brand text-base mb-4">Search existing school</h2>
        <div class="flex items-center gap-2 border border-gray-300 rounded-full px-4 py-2 mb-4">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="existingSearch" placeholder="Search school name / UDISE / village…"
                class="flex-1 text-sm outline-none" oninput="searchExisting(this.value)">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
        </div>
        <div id="existingResults" class="flex-1 space-y-2 min-h-[120px]">
            <p class="text-gray-400 text-sm text-center mt-8">Type to search schools…</p>
        </div>
        <form method="POST" class="mt-4 space-y-3" id="linkForm">
            <input type="hidden" name="action" value="link">
            <input type="hidden" name="dp_id" id="link_dp_id">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Link to Project</label>
                <select name="hp_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none">
                    <option value="">Select project…</option>
                    {% for p in projects %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
                </select>
            </div>
            <button type="submit"
                class="w-full bg-brand text-white font-bold py-2.5 rounded-lg text-sm hover:bg-brand-light transition">
                LINK EXISTING SCHOOL TO A PROJECT
            </button>
        </form>
    </div>

    <!-- Right: Add new -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 flex flex-col">
        <h2 class="font-bold text-brand text-base mb-4">Add new via Google Maps</h2>
        <div class="flex items-center gap-2 border border-gray-300 rounded-full px-4 py-2 mb-4">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="mapsSearch" placeholder="Search on Google Maps"
                class="flex-1 text-sm outline-none">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
        </div>
        <div id="mapPreview" class="w-full h-36 rounded-lg bg-gray-100 flex items-center justify-center text-gray-400 text-sm mb-3">
            Maps Preview
        </div>
        <p id="selectedLabel" class="text-sm text-gray-600 mb-3 hidden"><span class="font-semibold">Selected:</span> <span id="selectedName"></span></p>
        <form method="POST" class="space-y-3 flex-1 flex flex-col" id="addForm">
            <input type="hidden" name="action" value="add">
            <input type="hidden" name="latitude" id="new_lat">
            <input type="hidden" name="longitude" id="new_lng">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">School Name *</label>
                    <input type="text" name="name" id="new_name" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">UDISE Code</label>
                    <input type="text" name="udise"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">District</label>
                    <input type="text" name="district"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Tahsil</label>
                    <input type="text" name="tahsil"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand">
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Location / Village</label>
                <input type="text" name="location" id="new_location"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Link to Project</label>
                <select name="hp_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none">
                    <option value="">Select project…</option>
                    {% for p in projects %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
                </select>
            </div>
            <button type="submit"
                class="w-full bg-brand text-white font-bold py-2.5 rounded-lg text-sm hover:bg-brand-light transition mt-auto">
                ADD SCHOOL
            </button>
        </form>
    </div>
</div>

<script>
async function searchExisting(q) {
    if (q.length < 2) {
        document.getElementById('existingResults').innerHTML = '<p class="text-gray-400 text-sm text-center mt-8">Type to search schools…</p>';
        return;
    }
    const res = await fetch(`/schools/search-json?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const container = document.getElementById('existingResults');
    if (!data.length) {
        container.innerHTML = '<p class="text-gray-400 text-sm text-center mt-8">No schools found.</p>';
        return;
    }
    container.innerHTML = data.map(s => `
        <div onclick="selectExisting(${s.id}, '${s.name.replace(/'/g,"\\'")}', '${(s.location||'').replace(/'/g,"\\'")}' )"
            class="px-4 py-3 rounded-lg bg-gray-100 hover:bg-gray-200 cursor-pointer text-sm font-medium text-gray-700 transition">
            ${s.name} ${s.location ? '<span class="text-gray-400 font-normal">— '+s.location+'</span>' : ''}
        </div>`).join('');
}

function selectExisting(id, name, location) {
    document.getElementById('link_dp_id').value = id;
    document.querySelectorAll('#existingResults > div').forEach(d => d.classList.remove('ring-2','ring-brand','bg-brand/10'));
    event.currentTarget.classList.add('ring-2','ring-brand','bg-blue-50');
}

// Simple map embed on search
document.getElementById('mapsSearch').addEventListener('change', function() {
    const q = encodeURIComponent(this.value);
    document.getElementById('mapPreview').innerHTML =
        `<iframe width="100%" height="100%" style="border:0;border-radius:8px" loading="lazy"
        src="https://maps.google.com/maps?q=${q}&output=embed" allowfullscreen></iframe>`;
    document.getElementById('new_name').value = this.value;
    document.getElementById('selectedName').textContent = this.value;
    document.getElementById('selectedLabel').classList.remove('hidden');
});
</script>
{% endblock %}
